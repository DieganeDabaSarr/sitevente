<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELEGANCE 2.0 — Boutique Luxe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">💎</span>
        <span class="logo-text">ELEGANCE <span class="logo-version">2.0</span></span>
      </div>

      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Rechercher un produit..." />
        <button id="search-btn" aria-label="Rechercher">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>

      <div class="header-actions">
        <button id="dark-mode-btn" class="icon-btn" aria-label="Mode sombre" title="Mode sombre">
          <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="cart-btn" class="cart-btn" aria-label="Panier">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span id="cart-count" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- FILTERS BAR -->
  <section class="filters-bar">
    <div class="filters-inner">
      <div class="filter-group">
        <label for="category-filter">Catégorie :</label>
        <select id="category-filter">
          <option value="all">Toutes</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="sort-filter">Trier par :</label>
        <select id="sort-filter">
          <option value="default">Défaut</option>
          <option value="price-asc">Prix croissant</option>
          <option value="price-desc">Prix décroissant</option>
          <option value="name-asc">Nom A→Z</option>
        </select>
      </div>
      <div class="results-info">
        <span id="results-count">0 produits</span>
      </div>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main id="main-content">
    <!-- Loading state -->
    <div id="loader" class="loader">
      <div class="spinner"></div>
      <p>Chargement des produits...</p>
    </div>

    <!-- Error state -->
    <div id="error-msg" class="error-msg" style="display:none">
      <p>Impossible de charger les produits. Vérifiez votre connexion.</p>
      <button id="retry-btn">Réessayer</button>
    </div>

    <!-- Products grid -->
    <div id="products-grid" class="products-grid"></div>

    <!-- Empty search state -->
    <div id="empty-state" class="empty-state" style="display:none">
      <p>Aucun produit trouvé pour "<span id="search-term"></span>"</p>
    </div>
  </main>

  <!-- CART SIDEBAR -->
  <div id="cart-overlay" class="cart-overlay"></div>
  <aside id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
      <h2>Mon Panier</h2>
      <button id="cart-close" class="icon-btn" aria-label="Fermer le panier">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div id="cart-empty" class="cart-empty">
      <p>Votre panier est vide</p>
    </div>

    <ul id="cart-items" class="cart-items"></ul>

    <div id="cart-footer" class="cart-footer" style="display:none">
      <div class="cart-total">
        <span>Total :</span>
        <span id="cart-total-price">0.00 $</span>
      </div>
      <button id="clear-cart-btn" class="btn-secondary">Vider le panier</button>
      <button class="btn-primary">Commander</button>
    </div>
  </aside>

  <!-- PRODUCT DETAIL MODAL -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="product-modal" class="product-modal">
      <button id="modal-close" class="icon-btn modal-close-btn" aria-label="Fermer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-content">
        <div class="modal-image-wrap">
          <img id="modal-img" src="" alt="" />
        </div>
        <div class="modal-info">
          <p id="modal-category" class="modal-category"></p>
          <h2 id="modal-title"></h2>
          <div class="modal-rating">
            <span id="modal-stars"></span>
            <span id="modal-rating-count"></span>
          </div>
          <p id="modal-price" class="modal-price"></p>
          <p id="modal-description" class="modal-description"></p>
          <button id="modal-add-btn" class="btn-primary">Ajouter au panier</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 ELEGANCE 2.0 — Boutique Luxe &amp; Mode</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
